<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <rect width="1400" height="900" fill="#0b0d12"/>
  <rect x="44" y="44" width="1312" height="812" rx="18" fill="#11151d" stroke="#2a3140"/>
  <rect x="44" y="44" width="1312" height="62" rx="18" fill="#181e29"/>
  <circle cx="82" cy="75" r="8" fill="#ff5f57"/>
  <circle cx="110" cy="75" r="8" fill="#ffbd2e"/>
  <circle cx="138" cy="75" r="8" fill="#28c840"/>
  <text x="700" y="82" text-anchor="middle" fill="#a8b3c7" font-family="Menlo, Consolas, monospace" font-size="18">app/page.js + app/globals.css - despues</text>
  <text x="76" y="150" fill="#86efac" font-family="Menlo, Consolas, monospace" font-size="24" font-weight="700">Despues: imagenes reales y responsive</text>
  <text x="76" y="204" fill="#d6deeb" font-family="Menlo, Consolas, monospace" font-size="20" xml:space="preserve">
    <tspan x="76" dy="0">const productsData = [</tspan>
    <tspan x="116" dy="34">{ name: "Creatina", image: "https://cloudinary.images-iherb.com/.../nrx00074/y/39.jpg" },</tspan>
    <tspan x="116" dy="34">{ name: "Proteína", image: "https://cloudinary.images-iherb.com/.../nrx02905/y/33.jpg" },</tspan>
    <tspan x="76" dy="34">];</tspan>
    <tspan x="76" dy="42"></tspan>
    <tspan x="76" dy="42">&lt;img className="hero-athlete" src="https://us.123rf.com/...bodybuilder..." /&gt;</tspan>
    <tspan x="76" dy="42"></tspan>
    <tspan x="76" dy="42">&lt;div className="product-image"&gt;</tspan>
    <tspan x="116" dy="34">&lt;img src={p.image} alt={p.name} /&gt;</tspan>
    <tspan x="76" dy="34">&lt;/div&gt;</tspan>
    <tspan x="76" dy="42"></tspan>
    <tspan x="76" dy="42">.hero-athlete {</tspan>
    <tspan x="116" dy="34">position: absolute; right: clamp(24px, 7vw, 120px);</tspan>
    <tspan x="116" dy="34">mix-blend-mode: screen; filter: grayscale(1) contrast(1.45) brightness(0.76);</tspan>
    <tspan x="76" dy="34">}</tspan>
    <tspan x="76" dy="42"></tspan>
    <tspan x="76" dy="42">.product-image img { object-fit: contain; padding: 18px; }</tspan>
  </text>
  <rect x="76" y="758" width="1248" height="56" rx="10" fill="#18271f" stroke="#2f5a3d"/>
  <text x="104" y="793" fill="#86efac" font-family="Menlo, Consolas, monospace" font-size="19">Ahora el hero tiene silueta y cada producto renderiza su foto real con buen encuadre.</text>
</svg>
