<svg width="100%" viewBox="0 0 690 1040" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Flujo actualizado del frontend VitalCore — Next.js, React y Vercel</title>
  <desc>Diagrama del flujo del sitio VitalCore con usuario, navegador, estructura Next.js, componentes, estado, fetch, rutas, HTML CSS JS, recursos locales y deploy.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 600; }
      .small { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; font-weight: 400; }
      .tiny { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 11px; font-weight: 400; }
      .line { fill: none; stroke: #73726c; stroke-width: 1.5; }
      .next { fill: #eeedfe; stroke: #534ab7; stroke-width: 0.5; }
      .ui { fill: #e1f5ee; stroke: #0f6e56; stroke-width: 0.5; }
      .state { fill: #faeeda; stroke: #854f0b; stroke-width: 0.5; }
      .files { fill: #eaf3de; stroke: #3b6d11; stroke-width: 0.5; }
      .deploy { fill: #faece7; stroke: #993c1d; stroke-width: 0.5; }
    </style>
  </defs>

  <!-- Usuario y navegador -->
  <rect x="242" y="20" width="206" height="44" rx="8" class="next"/>
  <text x="345" y="43" text-anchor="middle" dominant-baseline="central" class="label" fill="#444441">Usuario / Navegador</text>
  <text x="345" y="60" text-anchor="middle" dominant-baseline="central" class="tiny" fill="#5f5e5a">entra a la URL publicada</text>
  <line x1="345" y1="64" x2="345" y2="92" marker-end="url(#arrow)" class="line"/>

  <!-- Next / rutas -->
  <rect x="40" y="94" width="610" height="204" rx="16" class="next"/>
  <text x="60" y="120" dominant-baseline="central" class="label" fill="#3c3489">Estructura general del frontend — Next.js / React</text>
  <text x="60" y="140" dominant-baseline="central" class="small" fill="#534ab7">App Router · una ruta principal · componente cliente para interactividad</text>

  <rect x="58" y="162" width="168" height="48" rx="8" class="next"/>
  <text x="142" y="180" text-anchor="middle" dominant-baseline="central" class="label" fill="#3c3489">app/layout.js</text>
  <text x="142" y="198" text-anchor="middle" dominant-baseline="central" class="tiny" fill="#534ab7">html, body, metadata</text>

  <line x1="226" y1="186" x2="264" y2="186" marker-end="url(#arrow)" class="line"/>
  <rect x="266" y="162" width="156" height="48" rx="8" class="next"/>
  <text x="344" y="180" text-anchor="middle" dominant-baseline="central" class="label" fill="#3c3489">app/page.js</text>
  <text x="344" y="198" text-anchor="middle" dominant-baseline="central" class="tiny" fill="#534ab7">ruta / · App</text>

  <line x1="422" y1="186" x2="460" y2="186" marker-end="url(#arrow)" class="line"/>
  <rect x="462" y="162" width="144" height="48" rx="8" class="next"/>
  <text x="534" y="180" text-anchor="middle" dominant-baseline="central" class="label" fill="#3c3489">'use client'</text>
  <text x="534" y="198" text-anchor="middle" dominant-baseline="central" class="tiny" fill="#534ab7">eventos + estado</text>

  <rect x="72" y="232" width="546" height="44" rx="10" class="next"/>
  <text x="345" y="250" text-anchor="middle" dominant-baseline="central" class="label" fill="#3c3489">Organización por rutas</text>
  <text x="345" y="268" text-anchor="middle" dominant-baseline="central" class="tiny" fill="#534ab7">Solo existe la ruta principal /; carrito y checkout son UI condicional dentro de page.js</text>

  <line x1="345" y1="298" x2="345" y2="326" marker-end="url(#arrow)" class="line"/>

  <!-- Componentes -->
  <rect x="40" y="328" width="610" height="166" rx="16" class="ui"/>
  <text x="345" y="354" text-anchor="middle" dominant-baseline="central" class="label" fill="#085041">Componentes principales renderizados</text>
  <text x="345" y="374" text-anchor="middle" dominant-baseline="central" class="small" fill="#0f6e56">Están escritos dentro de app/page.js como bloques JSX, no como archivos separados</text>

  <rect x="58" y="398" width="76" height="38" rx="8" class="ui"/>
  <text x="96" y="417" text-anchor="middle" dominant-baseline="central" class="small" fill="#085041">Nav</text>
  <rect x="146" y="398" width="78" height="38" rx="8" class="ui"/>
  <text x="185" y="417" text-anchor="middle" dominant-baseline="central" class="small" fill="#085041">Hero</text>
  <rect x="236" y="398" width="104" height="38" rx="8" class="ui"/>
  <text x="288" y="417" text-anchor="middle" dominant-baseline="central" class="small" fill="#085041">Productos</text>
  <rect x="352" y="398" width="98" height="38" rx="8" class="ui"/>
  <text x="401" y="417" text-anchor="middle" dominant-baseline="central" class="small" fill="#085041">Nosotros</text>
  <rect x="462" y="398" width="112" height="38" rx="8" class="ui"/>
  <text x="518" y="417" text-anchor="middle" dominant-baseline="central" class="small" fill="#085041">Newsletter</text>

  <rect x="92" y="448" width="118" height="30" rx="8" class="ui"/>
  <text x="151" y="463" text-anchor="middle" dominant-baseline="central" class="tiny" fill="#085041">Cart drawer</text>
  <rect x="230" y="448" width="126" height="30" rx="8" class="ui"/>
  <text x="293" y="463" text-anchor="middle" dominant-baseline="central" class="tiny" fill="#085041">Checkout modal</text>
  <rect x="376" y="448" width="82" height="30" rx="8" class="ui"/>
  <text x="417" y="463" text-anchor="middle" dominant-baseline="central" class="tiny" fill="#085041">Toast</text>
  <rect x="478" y="448" width="78" height="30" rx="8" class="ui"/>
  <text x="517" y="463" text-anchor="middle" dominant-baseline="central" class="tiny" fill="#085041">Footer</text>

  <line x1="345" y1="494" x2="345" y2="522" marker-end="url(#arrow)" class="line"/>

  <!-- Estado -->
  <rect x="40" y="524" width="610" height="150" rx="16" class="state"/>
  <text x="345" y="550" text-anchor="middle" dominant-baseline="central" class="label" fill="#633806">Manejo de estado conceptual</text>
  <text x="345" y="570" text-anchor="middle" dominant-baseline="central" class="small" fill="#854f0b">useState guarda memoria temporal; handlers modifican esa memoria</text>

  <rect x="62" y="596" width="128" height="44" rx="10" class="state"/>
  <text x="126" y="614" text-anchor="middle" dominant-baseline="central" class="label" fill="#633806">cart</text>
  <text x="126" y="632" text-anchor="middle" dominant-baseline="central" class="tiny" fill="#854f0b">items + qty</text>
  <rect x="208" y="596" width="132" height="44" rx="10" class="state"/>
  <text x="274" y="614" text-anchor="middle" dominant-baseline="central" class="label" fill="#633806">UI state</text>
  <text x="274" y="632" text-anchor="middle" dominant-baseline="central" class="tiny" fill="#854f0b">drawer, modal, toast</text>
  <rect x="358" y="596" width="112" height="44" rx="10" class="state"/>
  <text x="414" y="614" text-anchor="middle" dominant-baseline="central" class="label" fill="#633806">useRef</text>
  <text x="414" y="632" text-anchor="middle" dominant-baseline="central" class="tiny" fill="#854f0b">newsletter</text>
  <rect x="488" y="596" width="120" height="44" rx="10" class="state"/>
  <text x="548" y="614" text-anchor="middle" dominant-baseline="central" class="label" fill="#633806">totales</text>
  <text x="548" y="632" text-anchor="middle" dominant-baseline="central" class="tiny" fill="#854f0b">items + precio</text>
  <text x="345" y="660" text-anchor="middle" dominant-baseline="central" class="tiny" fill="#854f0b">addToCart · updateQty · removeItem · showToast · handlePlaceOrder</text>

  <line x1="345" y1="674" x2="345" y2="702" marker-end="url(#arrow)" class="line"/>

  <!-- HTML CSS JS -->
  <rect x="40" y="704" width="610" height="116" rx="16" class="files"/>
  <text x="345" y="730" text-anchor="middle" dominant-baseline="central" class="label" fill="#27500a">Separación conceptual: estructura, estilos y lógica</text>

  <rect x="64" y="756" width="160" height="44" rx="10" class="files"/>
  <text x="144" y="774" text-anchor="middle" dominant-baseline="central" class="label" fill="#27500a">HTML / JSX</text>
  <text x="144" y="792" text-anchor="middle" dominant-baseline="central" class="tiny" fill="#3b6d11">nav, section, img</text>
  <rect x="266" y="756" width="158" height="44" rx="10" class="files"/>
  <text x="345" y="774" text-anchor="middle" dominant-baseline="central" class="label" fill="#27500a">CSS</text>
  <text x="345" y="792" text-anchor="middle" dominant-baseline="central" class="tiny" fill="#3b6d11">app/globals.css</text>
  <rect x="466" y="756" width="160" height="44" rx="10" class="files"/>
  <text x="546" y="774" text-anchor="middle" dominant-baseline="central" class="label" fill="#27500a">JS / React</text>
  <text x="546" y="792" text-anchor="middle" dominant-baseline="central" class="tiny" fill="#3b6d11">eventos + render</text>

  <line x1="345" y1="820" x2="345" y2="848" marker-end="url(#arrow)" class="line"/>

  <!-- Datos / fetch / assets -->
  <rect x="40" y="850" width="610" height="88" rx="16" class="files"/>
  <text x="345" y="876" text-anchor="middle" dominant-baseline="central" class="label" fill="#27500a">Datos, fetch y recursos estáticos</text>
  <text x="345" y="898" text-anchor="middle" dominant-baseline="central" class="small" fill="#3b6d11">productsData vive en app/page.js · no hay fetch() ni API</text>
  <text x="345" y="918" text-anchor="middle" dominant-baseline="central" class="small" fill="#3b6d11">Las imágenes están en public/images y Vercel las publica como archivos del sitio</text>

  <line x1="345" y1="938" x2="345" y2="958" marker-end="url(#arrow)" class="line"/>

  <!-- Deploy -->
  <rect x="40" y="960" width="610" height="56" rx="16" class="deploy"/>
  <text x="345" y="982" text-anchor="middle" dominant-baseline="central" class="label" fill="#712b13">Flujo de deploy conceptual</text>
  <text x="72" y="1004" class="small" fill="#712b13">Código</text>
  <line x1="122" y1="1000" x2="178" y2="1000" marker-end="url(#arrow)" class="line"/>
  <text x="194" y="1004" class="small" fill="#712b13">GitHub</text>
  <line x1="250" y1="1000" x2="306" y2="1000" marker-end="url(#arrow)" class="line"/>
  <text x="322" y="1004" class="small" fill="#712b13">Pipeline / build</text>
  <line x1="430" y1="1000" x2="486" y2="1000" marker-end="url(#arrow)" class="line"/>
  <text x="502" y="1004" class="small" fill="#712b13">Sitio publicado</text>

  <!-- Leyenda -->
  <rect x="54" y="1026" width="10" height="10" rx="2" class="next"/>
  <text x="70" y="1035" class="tiny" fill="#3d3d3a">Next / rutas</text>
  <rect x="158" y="1026" width="10" height="10" rx="2" class="ui"/>
  <text x="174" y="1035" class="tiny" fill="#3d3d3a">UI</text>
  <rect x="220" y="1026" width="10" height="10" rx="2" class="state"/>
  <text x="236" y="1035" class="tiny" fill="#3d3d3a">Estado</text>
  <rect x="298" y="1026" width="10" height="10" rx="2" class="files"/>
  <text x="314" y="1035" class="tiny" fill="#3d3d3a">Archivos / datos</text>
  <rect x="424" y="1026" width="10" height="10" rx="2" class="deploy"/>
  <text x="440" y="1035" class="tiny" fill="#3d3d3a">Deploy</text>
</svg>
